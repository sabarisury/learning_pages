      {id:"iq",         label:"12. Interviews"},
    ];

    const iqData = {
      "⚡ Fundamentals": [
        {q:"What is a vector embedding?",
         a:"An embedding maps discrete objects (words, images, users, etc.) into a continuous vector space — a list of real numbers — where similar items are placed close together. The key insight: meaning is encoded as geometry. Direction and distance in this space correspond to semantic relationships. E.g., 'cat' → [0.2, 0.7, -0.1, ...]"},
        {q:"Why are embeddings better than one-hot encoding?",
         a:"One-hot encoding creates huge sparse vectors with zero semantic info — 'cat' and 'kitten' look as different as 'cat' and 'democracy'. Problems: (1) Vocabulary of 50,000 = 50,000-dim vector mostly zeros. (2) No relationship between similar words. (3) Cannot generalize. Embeddings are dense (short, info-rich), semantic (similar meaning = similar vector), and learned from actual usage data."},
        {q:"What is cosine similarity? Why use it instead of Euclidean distance?",
         a:"Cosine similarity = dot(A,B) / (|A| × |B|). It measures the angle between two vectors, ranging from -1 (opposite) to 1 (identical direction). We prefer it over Euclidean distance because magnitude shouldn't affect meaning — 'cat' appearing 100x vs 10x in a corpus shouldn't make it semantically different. Cosine cares only about direction (meaning), not length (frequency)."},
        {q:"Explain king − man + woman = queen geometrically.",
         a:"The vector offset 'man → woman' encodes 'gender change' as a direction in space. This works because 'king' and 'queen' both appear near 'royal', 'throne', 'crown' — so they cluster together. But 'king' also appears near 'man' while 'queen' appears near 'woman' — that directional offset is the gender concept. Adding it to king navigates you to queen."},
        {q:"What is the curse of dimensionality in the context of embeddings?",
         a:"At very high dimensions, all vectors become roughly equidistant from each other, making similarity search less meaningful. The volume of high-dimensional space grows exponentially fast so points become sparse — nearest neighbors aren't actually near. In practice, 768 dims is a sweet spot for NLP. Beyond ~3000 dims, you also get huge memory and compute costs with diminishing returns."},
        {q:"What is the difference between static and contextual embeddings?",
         a:"Static embeddings (Word2Vec, GloVe) assign one fixed vector per word regardless of context — 'bank' always gets the same vector whether it's financial or a river bank. Contextual embeddings (BERT, GPT) generate a different vector per occurrence based on the full sentence. This solves polysemy (words with multiple meanings), making them far more powerful for most NLP tasks."},
        {q:"What types of data can be embedded?",
         a:"Almost anything: (1) Words/tokens — Word2Vec, GloVe. (2) Sentences/documents — SBERT, Universal Sentence Encoder. (3) Images — ResNet features, CLIP. (4) Graphs — Node2Vec, GraphSAGE. (5) Users/Items — matrix factorization, two-tower models. (6) Code — CodeBERT. (7) Audio — wav2vec. (8) Multimodal — CLIP embeds text and images in the SAME space."},
      ],
      "🧠 Architecture & Training": [
        {q:"What does an embedding layer look like in a neural network?",
         a:"An embedding layer is a lookup table — a matrix of shape (vocab_size × embedding_dim). For input token ID 42, the forward pass returns row 42. That's literally it. In PyTorch: nn.Embedding(num_embeddings=10000, embedding_dim=256). Gradients flow back during training and update the matrix. Memory = vocab_size × embedding_dim × 4 bytes."},
        {q:"What is negative sampling and why is it used in Word2Vec?",
         a:"Full softmax over 50,000+ words per training step is too expensive. Negative sampling replaces it: instead of predicting the true word from all words, train a binary classifier — 'is this a real context word or a random word?' Only 5–20 random negatives are sampled per positive example, reducing computation from O(vocab) to O(negatives). Empirically, 5–20 negatives gives near-identical quality to full softmax."},
        {q:"CBOW vs Skip-Gram — differences and when to use each?",
         a:"CBOW: input = context words → output = center word. Faster, better for frequent words. Skip-Gram: input = center word → output = context words. Slower but better for rare words. Skip-Gram is preferred in practice. Why? Rare words benefit more from being used as input many times. For large vocab with many rare words, Skip-Gram produces better embeddings."},
        {q:"How does GloVe differ from Word2Vec?",
         a:"Word2Vec uses local context windows — it sees word pairs one at a time. GloVe (Global Vectors) builds a full co-occurrence matrix X where X_ij = how often word i appears near word j in the entire corpus. It then factorizes this matrix to minimize: (w_i · w_j + b_i + b_j − log(X_ij))². GloVe captures both local and global statistics simultaneously, often performing better on analogy tasks."},
        {q:"How does FastText handle out-of-vocabulary (OOV) words?",
         a:"FastText breaks words into character n-grams. 'running' → <ru, run, unn, nni, nin, ing, ng>. Word embedding = sum of all its n-gram embeddings. Even a completely unseen word 'embedificationalism' can be embedded by summing its character n-grams. Benefits: (1) Handles OOV words. (2) Better for morphologically rich languages (Turkish, Finnish). (3) Captures spelling patterns and prefixes/suffixes."},
        {q:"What is triplet loss? When would you use it?",
         a:"Triplet loss uses three examples: anchor (A), positive (P, same class), negative (N, different class). Loss = max(0, d(A,P) − d(A,N) + margin). It pushes A closer to P and farther from N by at least 'margin'. Used when you have labeled pairs/triplets: face recognition, product similarity, sentence similarity fine-tuning (SBERT). Harder to train than cross-entropy but produces better-calibrated similarity spaces."},
        {q:"What is contrastive learning? How does SimCSE work?",
         a:"Contrastive learning trains embeddings by pushing similar pairs together and dissimilar pairs apart, without labeled data. SimCSE (Simple Contrastive Sentence Embeddings): pass the same sentence through BERT twice with different dropout masks — these become the positive pair. All other sentences in the batch are negatives. Loss = InfoNCE. Result: dramatically better sentence embeddings than standard BERT fine-tuning, using zero extra labels."},
      ],
      "🚀 Applied / System Design": [
        {q:"How would you build a semantic search system from scratch?",
         a:"(1) Choose embedding model — Sentence-BERT or OpenAI embeddings. (2) Embed all documents offline, store in vector DB (Pinecone, Qdrant, pgvector). (3) Build ANN index — HNSW for best recall/speed trade-off. (4) At query time: embed query → ANN search for top-K candidates → optional re-ranking with cross-encoder. (5) Key decisions: embedding model, chunk size, overlap, index type, re-ranking strategy. Monitor with precision@K and MRR."},
        {q:"What is RAG? What role do embeddings play?",
         a:"RAG (Retrieval-Augmented Generation) grounds LLM responses in actual documents. Pipeline: (1) Offline: chunk documents, embed each chunk, store in vector DB. (2) Online: embed user query, retrieve top-K most similar chunks via ANN search, pass [chunks + query] to LLM. Embeddings are the 'long-term memory' of RAG. Quality of retrieval directly determines quality of generation — bad embeddings = bad RAG."},
        {q:"You have 10 million product descriptions. How do you find duplicates efficiently?",
         a:"(1) Embed all descriptions with a fast model (all-MiniLM-L6-v2 — tiny, 384 dims). (2) Build FAISS IVF-PQ index — clusters + quantization handles 10M vectors in RAM. (3) For each item, query its K nearest neighbors. (4) Threshold by cosine similarity (>0.95 = near-duplicate). (5) Optional: LSH (Locality Sensitive Hashing) as a cheap first pass to reduce candidates. At 10M scale, brute-force is impossible — ANN is mandatory."},
        {q:"How do you evaluate embedding quality?",
         a:"Intrinsic evaluation: (1) Word analogy benchmarks (king-man+woman=queen accuracy on Google Analogy Dataset). (2) Similarity correlation with human judgments (STS-B, SimLex-999). Extrinsic evaluation: (3) Downstream task performance (classification accuracy, IR metrics). For production: (4) Precision@K and Recall@K on labeled eval set. (5) MRR (Mean Reciprocal Rank). (6) NDCG@K. Always prefer extrinsic — intrinsic benchmarks don't always predict real task quality."},
        {q:"What is a two-tower model? Where is it used?",
         a:"Two separate neural networks encode queries and items independently into the same embedding space. Similarity = dot product of both embeddings. Benefit: item embeddings can be pre-computed offline — at query time, only the query tower runs. Used in: YouTube recommendation (user tower + video tower), Pinterest visual search, Google semantic search. The key architectural insight: offline pre-computation enables real-time retrieval over billions of items."},
        {q:"How do multimodal embeddings work? What is CLIP?",
         a:"CLIP (Contrastive Language-Image Pre-training, OpenAI) trains two encoders — a text encoder and an image encoder — to map matching text-image pairs close together in a shared embedding space. Loss: contrastive, pushing matching pairs together and non-matching apart. Result: you can embed both 'a photo of a cat' and an actual cat photo into the same space and find matches. Enables zero-shot image classification, cross-modal search, and image generation guidance."},
      ],
      "🎯 Tricky / Deep": [
        {q:"Can you directly compare embeddings from two different models?",
         a:"No! Different models produce incomparable vector spaces — they have no shared coordinate system. Even the same model trained twice from different random seeds produces incomparable spaces (same structure, different rotation). To align spaces you need: (1) Procrustes analysis — find optimal rotation matrix W such that WA ≈ B. (2) CCA (Canonical Correlation Analysis). (3) Linear mapping trained on anchor pairs. This is used in cross-lingual embedding alignment."},
        {q:"If two words have high cosine similarity, does that mean they're synonyms?",
         a:"Not necessarily. High similarity means they appear in similar contexts — which could mean: (1) Synonyms (happy/joyful). (2) Antonyms — 'hot' and 'cold' often appear near the same words (temperature, weather, food). (3) Hypernyms (dog/animal). (4) Topically related words (hospital/doctor). Distributional similarity ≠ semantic equivalence. Always validate embeddings on your actual downstream task."},
        {q:"How do positional embeddings work in transformers?",
         a:"Transformers process all tokens in parallel — unlike RNNs, they have no inherent notion of order. Without position info, 'cat sat on mat' = 'mat on sat cat'. Solution: add position vectors to token embeddings. Types: (1) Sinusoidal (original paper) — fixed, mathematical functions. (2) Learned absolute — trainable position vectors. (3) RoPE (Rotary) — encodes position as rotation, handles long sequences well. (4) ALiBi — adds linear bias to attention scores. Modern LLMs mostly use RoPE."},
        {q:"What is vector quantization? Trade-offs?",
         a:"Vector quantization compresses high-dimensional vectors to save memory and speed up search. Product Quantization (PQ): split a 768-dim vector into M sub-vectors, assign each to a centroid from a codebook of K centroids. Result: represent 768 × 4 bytes = 3KB as just M × log2(K) bits ≈ 64 bytes (48x compression). Trade-offs: (1) Memory: 10–50x reduction. (2) Speed: 10–100x faster distance computation. (3) Recall: small drop in finding true nearest neighbor. Used in FAISS for billion-scale ANN search."},
        {q:"How would you detect semantic drift in word embeddings over time?",
         a:"(1) Train embeddings on time-sliced corpora (e.g., yearly news archives). (2) Align spaces using Procrustes analysis — find rotation W to map year N to year N+1. (3) Measure cosine distance between a word's representation across years after alignment. (4) Words with high drift = semantic change. Example: 'gay' in 1950s vs 2020s has very different nearest neighbors. Applications: tracking evolving jargon, detecting bias shifts, lexicographic research."},
        {q:"How do you make embedding search work in real-time at scale?",
         a:"Key techniques: (1) ANN algorithms — HNSW (best recall), IVF (fast with large datasets), ScaNN (Google's quantization-aware). (2) Quantization (INT8/PQ) — reduce vector size, speeds up distance computation. (3) Sharding — split index across machines, fan-out query to all shards. (4) Caching — cache embeddings of common queries. (5) Two-stage retrieval — fast ANN for top-100, expensive re-ranker for top-10. Pinterest serves 1B+ image queries/day using these techniques."},
      ],
    };

    // ── HELPERS ──────────────────────────────────────────────────────────────────

    function cosSim(a, b) {
      const dot = a[0]*b[0] + a[1]*b[1];
      return dot / (Math.hypot(...a) * Math.hypot(...b));
    }

    // ── STYLES ───────────────────────────────────────────────────────────────────

    const C = {

    const S = {
      page:   {background:C.bg, color:C.text, minHeight:"100vh", fontFamily:"Georgia,serif"},
      nav:    {background:"rgba(10,10,15,0.97)", borderBottom:`1px solid ${C.border}`,

    function VecDisplay({word}) {
      if (!word) return <div style={{color:C.muted, fontSize:13, padding:"1rem", textAlign:"center"}}>← click a word to see its vector</div>;

      return (
        <div>
          <div style={{color, fontWeight:700, marginBottom:8, fontSize:15, fontFamily:"'Syne',sans-serif"}}>"{word}"</div>
          {dims.map((v,i) => (

              <span style={{color:C.muted, fontSize:10, fontFamily:"monospace", width:38, textAlign:"right"}}>{v.toFixed(2)}</span>
            </div>
          ))}
          <div style={{color:C.muted, fontSize:10, marginTop:6, textAlign:"center", fontStyle:"italic", fontFamily:"monospace"}}>
            [{dims.map(v=>v.toFixed(2)).join(", ")}, ...]
          </div>
        </div>
      );
    }

    function WordSpaceCanvas({cluster}) {
      const ref = useRef(null);
      const [hov, setHov] = useState(null);
      const hovRef = useRef(null);
      hovRef.current = hov;

      useEffect(()=>{
        const canvas = ref.current; if (!canvas) return;
        let raf;
        function draw() {
          const W=canvas.offsetWidth, H=canvas.offsetHeight;
          canvas.width=W*devicePixelRatio; canvas.height=H*devicePixelRatio;
          const ctx=canvas.getContext("2d"); ctx.scale(devicePixelRatio,devicePixelRatio);
          ctx.clearRect(0,0,W,H);
          ctx.strokeStyle="rgba(42,42,64,0.4)"; ctx.lineWidth=1;
          for(let x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
          for(let y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
          wordPoints.forEach(p=>{
            const px=p.x*W, py=p.y*H;
            const active=cluster==="all"||p.g===cluster;
            ctx.globalAlpha=active?1:0.12;
            if(active&&cluster!=="all"){
              wordPoints.filter(q=>q.g===p.g&&q.w!==p.w).forEach(q=>{
                ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(q.x*W,q.y*H);
                ctx.strokeStyle=p.c+"33";ctx.lineWidth=1;ctx.stroke();
              });
            }
            const isHov=hovRef.current===p.w;
            if(isHov){ctx.shadowBlur=16;ctx.shadowColor=p.c;}
            ctx.beginPath();ctx.arc(px,py,isHov?9:6,0,Math.PI*2);
            ctx.fillStyle=p.c;ctx.fill();
            ctx.shadowBlur=0;
            ctx.fillStyle=isHov?"#fff":"#e8e8f0";
            ctx.font=`${isHov?"bold ":""}${isHov?13:11}px Syne,sans-serif`;
            ctx.fillText(p.w,px+10,py+4);
            ctx.globalAlpha=1;
          });
          raf=requestAnimationFrame(draw);
        }
        draw();
        const ro=new ResizeObserver(draw); ro.observe(canvas);
        return ()=>{cancelAnimationFrame(raf);ro.disconnect();};
      },[cluster]);

      function onMouseMove(e){
        const r=ref.current.getBoundingClientRect();
        const mx=e.clientX-r.left, my=e.clientY-r.top;
        const W=ref.current.offsetWidth, H=ref.current.offsetHeight;
        const found=wordPoints.find(p=>Math.hypot(p.x*W-mx,p.y*H-my)<14);
        setHov(found?found.w:null);
      }
      return <canvas ref={ref} onMouseMove={onMouseMove} onMouseLeave={()=>setHov(null)} style={{display:"block",width:"100%",height:300,cursor:"crosshair"}}/>;
    }

    function CosineCanvas({pair}) {
      const ref = useRef(null);
      const pairs = {
        "king/queen":{a:[0.8,0.5],b:[0.75,0.62],ca:"#f7c46a",cb:"#a78bfa"},
        "cat/dog":   {a:[0.2,0.7],b:[0.25,0.8], ca:"#34d399",cb:"#60a5fa"},
        "king/apple":{a:[0.8,0.5],b:[0.7,0.2],  ca:"#f7c46a",cb:"#f87171"},
        "man/woman": {a:[0.5,0.3],b:[0.55,0.45],ca:"#60a5fa",cb:"#f87171"},
        "hot/cold":  {a:[0.6,0.4],b:[0.58,0.42],ca:"#f87171",cb:"#60a5fa"},
      };
      const {a,b,ca,cb} = pairs[pair]||pairs["king/queen"];
      const sim = cosSim(a,b);

      useEffect(()=>{
        const canvas=ref.current; if(!canvas) return;
        function draw(){
          const W=canvas.offsetWidth, H=250;
          canvas.width=W*devicePixelRatio; canvas.height=H*devicePixelRatio;
          const ctx=canvas.getContext("2d"); ctx.scale(devicePixelRatio,devicePixelRatio);
          ctx.clearRect(0,0,W,H);
          const ox=W/2, oy=H*0.62, sc=Math.min(W,H)*0.36;
          ctx.strokeStyle="rgba(42,42,64,0.8)";ctx.lineWidth=1;
          ctx.beginPath();ctx.moveTo(20,oy);ctx.lineTo(W-20,oy);ctx.stroke();
          ctx.beginPath();ctx.moveTo(ox,10);ctx.lineTo(ox,H-10);ctx.stroke();
          ctx.fillStyle="rgba(42,42,64,0.2)";
          ctx.beginPath();ctx.arc(ox,oy,sc,0,-Math.PI,true);ctx.fill();
          const norm=v=>{const m=Math.hypot(...v);return[v[0]/m,v[1]/m];};
          function drawVec(v,color,label){
            const n=norm(v);
            const ex=ox+n[0]*sc, ey=oy-n[1]*sc;
            ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ex,ey);
            ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.stroke();
            const ang=Math.atan2(-(ey-oy),(ex-ox));
            ctx.beginPath();ctx.moveTo(ex,ey);
            ctx.lineTo(ex-11*Math.cos(ang-0.4),ey+11*Math.sin(ang-0.4));
            ctx.lineTo(ex-11*Math.cos(ang+0.4),ey+11*Math.sin(ang+0.4));
            ctx.closePath();ctx.fillStyle=color;ctx.fill();
            ctx.fillStyle=color;ctx.font="bold 13px Syne,sans-serif";ctx.textAlign="center";
            ctx.fillText(label,ex+(n[0]>0?22:-22),ey+(n[1]>0?-12:18));
          }
          drawVec(a,ca,pair.split("/")[0]);
          drawVec(b,cb,pair.split("/")[1]);
          const [na,nb]=[norm(a),norm(b)];
          ctx.beginPath();ctx.arc(ox,oy,44,-Math.atan2(na[1],na[0]),-Math.atan2(nb[1],nb[0]),Math.atan2(na[1],na[0])>Math.atan2(nb[1],nb[0]));
          ctx.strokeStyle="rgba(106,247,196,0.7)";ctx.lineWidth=2;ctx.stroke();
        }
        draw();
        const ro=new ResizeObserver(draw);ro.observe(canvas);
        return()=>ro.disconnect();
      },[pair]);

      const sc=sim>0.85?C.accent3:sim>0.5?C.accent2:C.accent4;
      return (
        <div>
          <canvas ref={ref} style={{display:"block",width:"100%"}}/>

            {tab==="contextual"&&(

                <h2 style={S.h2}>Static vs Contextual Embeddings</h2>
                <p style={S.p}>The single biggest limitation of Word2Vec and GloVe: every word gets exactly ONE vector, forever. This breaks for polysemous words — words with multiple meanings.</p>

                <div style={S.card}>
                  <h3 style={S.h3}>The Polysemy Problem</h3>
                  {[
                    ["bank","I went to the bank to deposit money.","Financial institution — vault, transactions"],
                    ["bank","I sat by the river bank and watched the ducks.","River bank — water, nature, outdoor"],
                    ["plant","The plant grew taller every day.","Living organism — biology, photosynthesis"],
                    ["plant","They decided to plant a spy in the organization.","Place secretly — espionage, covert"],
                  ].map(([w,s,m],i)=>(

                <div style={S.card}>
                  <h3 style={S.h3}>How BERT Creates Contextual Embeddings</h3>
                  <Step n="01" title="Read the full sentence" desc="BERT processes ALL tokens in the sentence simultaneously, attending to every other token."/>
                  <Step n="02" title="Multi-head self-attention" desc="Each word 'looks at' all other words in the sentence. The attention weights determine how much each context word influences the current word's representation."/>
                  <Step n="03" title="Context-aware output" desc="'Bank' in sentence 1 attends heavily to 'deposit' and 'money' → financial embedding. 'Bank' in sentence 2 attends to 'river' and 'ducks' → nature embedding."/>

                    {name:"BERT",type:"Contextual",col:"#34d399",note:"1 vector per occurrence. Bidirectional."},
                    {name:"GPT",type:"Contextual",col:"#34d399",note:"Left-to-right context. Good for generation."},

            {tab==="similarity"&&(

                <span style={S.label}>Chapter 07</span>
                <h2 style={S.h2}>Measuring Similarity</h2>
                <p style={S.p}>Once you have embeddings, how do you measure how similar two things are? There are several distance metrics, each with trade-offs.</p>

                <div style={S.card}>
                  <h3 style={S.h3}>Cosine Similarity — Interactive Demo</h3>
                  <p style={{...S.p,fontSize:12,marginBottom:12}}>Select a pair to see the angle between their vectors. Smaller angle = more similar.</p>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
                    {["king/queen","cat/dog","king/apple","man/woman","hot/cold"].map(p=>(
                      <button key={p} style={S.btn(cosPair===p)} onClick={()=>setCosPair(p)}>{p.replace("/"," vs ")}</button>
                    ))}

                </div>

                <div style={S.card}>
                  <h3 style={S.h3}>Similarity Metrics Compared</h3>
                  <table style={S.table}>
                    <thead><tr><th style={S.th}>Metric</th><th style={S.th}>Formula</th><th style={S.th}>Range</th><th style={S.th}>Best For</th></tr></thead>
                    <tbody>
                      {[
                        ["Cosine Similarity","A·B / (|A|×|B|)","[-1, 1]","Text & NLP (most common)", "#34d399"],
                        ["Dot Product","Σ aᵢbᵢ","(-∞, ∞)","Attention, retrieval with trained models","#a78bfa"],
                        ["Euclidean Distance","√Σ(aᵢ-bᵢ)²","[0, ∞)","When magnitude matters (image features)","#f7c46a"],
                        ["Manhattan Distance","Σ|aᵢ-bᵢ|","[0, ∞)","Sparse vectors, taxicab geometry","#f87171"],

                        <td style={{...S.td,color:C.muted,fontSize:12}}>{b}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <Analogy title="Why Cosine Over Euclidean for Text?">
                  If "cat" appears 100 times in a corpus and "kitten" appears 10 times, their vectors might have different magnitudes (lengths) but similar directions. Euclidean distance would see them as far apart due to the length difference. Cosine similarity ignores length — it only looks at the angle (direction = meaning). Same direction = same meaning, regardless of how "loud" the vector is.
                </Analogy>

                    ["0.70 – 0.85","Related — same domain or broad topic","#f7c46a"],

                  <h3 style={S.h3}>What Does Each Dimension Mean?</h3>
                  <p style={{...S.p,fontSize:13}}>The dimensions in trained embeddings don't have human-interpretable labels like "royalness" or "gender". They're abstract learned features. However, some researchers have probed individual dimensions and found loose interpretations:</p>

                    <div style={{color:C.accent2,marginBottom:6}}>dim[142]: seems to activate for animate objects (people, animals)</div>
                    <div style={{color:C.accent3,marginBottom:6}}>dim[287]: negative for abstract concepts, positive for physical objects</div>
                    <div style={{color:"#a78bfa",marginBottom:6}}>dim[521]: correlates with positive sentiment words</div>
                    <div style={{color:C.muted}}>...most dimensions are inscrutable combinations of features</div>

                    </tbody>
                  </table>
                </div>

                <div style={S.card}>
                  <h3 style={S.h3}>Choosing Embedding Dimensions — Trade-offs</h3>

                      <span style={{color:C.muted,fontSize:12,lineHeight:1.6}}>{v}</span>

                  ))}
                </div>

                <Analogy title="The Curse of Dimensionality">
                  Imagine a 1D line. Two random points are at most 1 unit apart. Now 2D: max distance is √2. In 100D: max distance is √100 = 10. In 10,000D: max distance is 100. At very high dimensions, all random vectors become roughly the SAME distance from each other — roughly equidistant. This makes "closest neighbor" searches less meaningful because everything is similarly far away.

                  <h3 style={S.h3}>Why Fine-tune?</h3>
                  <p style={{...S.p,fontSize:13}}>General embeddings trained on Wikipedia/news don't know that in medical text "MI" means "myocardial infarction" or that in your e-commerce catalog "wireless" and "Bluetooth" are nearly synonymous. Fine-tuning adapts the embedding space to your domain.</p>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div style={{background:C.surface2,borderRadius:8,padding:12}}>
                      <div style={{color:"#f87171",fontSize:12,fontWeight:700,marginBottom:6}}>General embedding says:</div>
                      <div style={{fontFamily:"monospace",fontSize:11,color:C.muted}}>
                        "MI" ≈ "Michigan" (geography)<br/>
                        "BID" ≈ "auction"<br/>
                        "prognosis" is rare/unknown
                      </div>
                    </div>
                    <div style={{background:C.surface2,borderRadius:8,padding:12}}>
                      <div style={{color:C.accent3,fontSize:12,fontWeight:700,marginBottom:6}}>Medical fine-tuned says:</div>
                      <div style={{fontFamily:"monospace",fontSize:11,color:C.muted}}>
                        "MI" ≈ "heart attack"<br/>

                      </div>

                </div>

                  <h3 style={S.h3}>Fine-tuning Approaches</h3>
                  {[
                    {name:"Full Fine-tuning",col:"#f7c46a",
                     desc:"Update ALL weights of the pre-trained model on your domain data. Best quality, but requires lots of labeled data and compute. Risk: catastrophic forgetting of general knowledge."},
                    {name:"Contrastive Learning (SimCSE, MNRL)",col:"#34d399",
                     desc:"Push similar pairs together, dissimilar pairs apart. Doesn't need labels if you use data augmentation (dropout = cheap positive pairs). Very popular for sentence embeddings."},
                    {name:"Triplet Loss Fine-tuning",col:"#a78bfa",
                     desc:"Train with (anchor, positive, negative) triplets. max(0, d(A,P) − d(A,N) + margin). Great when you have labeled similar/dissimilar pairs from your domain."},
                    {name:"Adapter Layers",col:"#60a5fa",
                     desc:"Freeze the base model completely. Add small trainable layers (adapters) between transformer blocks. Only adapters are fine-tuned. Parameter-efficient: update <2% of parameters."},
                    {name:"LoRA (Low-Rank Adaptation)",col:"#f87171",

                  <Step n="01" title="Create pairs from your data" desc="Positive pairs: (query, relevant document), (question, answer), (product, description). Negative pairs: everything else in the batch (in-batch negatives)."/>
                  <Step n="02" title="Forward pass both items" desc="Run query through encoder → embedding A. Run document through encoder → embedding B."/>
                  <Step n="03" title="InfoNCE loss" desc="Maximize similarity of positive pairs, minimize similarity of negative pairs simultaneously. The whole batch participates in each loss computation."/>
                  <Step n="04" title="Result" desc="Embeddings reorganize so your domain-specific similar items cluster together while unrelated items push apart."/>
                </div>
              </div>

                    </div>
                    <div style={{color:C.accent3,fontFamily:"monospace",fontSize:12}}>
                      ANN index: pre-built structure → find ~nearest neighbors<br/>
                      1M docs × 768 dims = ~5 milliseconds ✓
                    </div>
                  </div>
                  <p style={{...S.p,fontSize:13}}>Approximate Nearest Neighbor (ANN) algorithms sacrifice a tiny bit of recall (might miss the true #1 closest) for massive speed gains.</p>
                </div>

                  <h3 style={S.h3}>ANN Algorithms</h3>

                    {name:"IVF",full:"Inverted File Index",col:"#f7c46a",

                    {name:"FAISS",full:"Facebook AI Similarity Search",col:"#a78bfa",

                  </table>
                </div>

                <div style={S.card}>
                  <h3 style={S.h3}>Vector Quantization — Compressing Embeddings</h3>
                  <p style={{...S.p,fontSize:13}}>At scale, storing 768-dim float32 vectors gets expensive. 1 billion vectors = 768 × 4 bytes × 1B = 3TB. Quantization compresses this dramatically.</p>
                  <Step n="PQ" title="Product Quantization" desc="Split the 768-dim vector into M sub-vectors of 96 dims each. Assign each sub-vector to one of 256 centroids from a codebook. Store only the centroid IDs. 768×4 bytes → 8 bytes (96x compression!). Small recall drop."/>
                  <Step n="SQ" title="Scalar Quantization" desc="Round each float32 value to int8 (4x compression) or int4 (8x). Simple, fast, minimal recall impact. Used widely in production."/>
                  <Step n="BQ" title="Binary Quantization" desc="Round each dimension to 0 or 1. 32x compression. Comparison via Hamming distance (very fast). OpenAI's text-embedding-3 models support this."/>
                </div>
              </div>
            )}

            {/* ══════════════════════════════════════════════════════════════════════
                TAB 11 — APPLICATIONS
            ══════════════════════════════════════════════════════════════════════ */}
            {tab==="apps"&&(
              <div>
                <span style={S.label}>Chapter 11</span>
                <h2 style={S.h2}>Real-World Applications</h2>
                <p style={S.p}>Embeddings are one of the most widely deployed ML techniques. Here are the most important applications in industry.</p>

                {[
                  {icon:"🔍",title:"Semantic Search",col:"#a78bfa",
                   desc:"Go beyond keyword matching. Embed query + documents, find closest by meaning. A search for 'car accident' finds documents about 'vehicle collision' even if they don't share keywords.",
                   example:"Elasticsearch, Algolia, Google Search use this at scale."},
                  {icon:"🤖",title:"RAG (Retrieval-Augmented Generation)",col:"#34d399",
                   desc:"The backbone of modern AI assistants. Store document chunks as embeddings. When user asks a question, retrieve relevant chunks, feed to LLM. Grounds responses in actual data.",
                   example:"ChatGPT Enterprise, Perplexity AI, most AI chatbots with knowledge bases."},
                  {icon:"🛍️",title:"Recommendation Systems",col:"#f7c46a",
                   desc:"User embedding + item embeddings in the same space. Recommend items closest to the user's embedding. Two-tower architecture enables pre-computed item embeddings for real-time serving.",
                   example:"YouTube 'Up Next', Spotify 'Discover Weekly', Amazon product recommendations."},
                  {icon:"🔄",title:"Duplicate & Plagiarism Detection",col:"#f87171",
                   desc:"Near-identical embeddings = near-duplicate content. Find paraphrases, copies, near-matches at scale without exact string matching.",
                   example:"Academic plagiarism detection, content deduplication in datasets."},
                  {icon:"🌐",title:"Cross-Lingual Search",col:"#60a5fa",
                   desc:"Multilingual models (mBERT, LaBSE) map semantically equivalent text in different languages to nearby vectors. Search in English, find results in Spanish, Hindi, Arabic.",
                   example:"Google Translate, multilingual enterprise search systems."},
                  {icon:"⚠️",title:"Anomaly & Fraud Detection",col:"#f87171",
                   desc:"Embed transactions, user behavior, or log entries. Normal data forms clusters. Points far from any cluster center = anomalies. Catches novel fraud patterns unseen in training.",
                   example:"Credit card fraud detection, network intrusion detection."},
                  {icon:"🏷️",title:"Zero-Shot & Few-Shot Classification",col:"#a78bfa",
                   desc:"With CLIP or SBERT: embed class names as text, embed items, classify by closest class embedding. No labeled data needed for new classes.",
                   example:"CLIP can classify images into arbitrary categories specified as text."},
                  {icon:"🗂️",title:"Document Clustering & Topic Modeling",col:"#34d399",
                   desc:"Embed documents, run k-means or HDBSCAN. Similar documents cluster automatically. UMAP + HDBSCAN is a powerful modern topic modeling pipeline.",
                   example:"BERTopic library — state-of-art topic modeling using embeddings."},
                  {icon:"💬",title:"Chatbot Intent Detection",col:"#f7c46a",
                   desc:"Embed user messages and intent examples. Route to the closest intent handler. Much more robust than keyword rules, handles paraphrases and typos naturally.",
                   example:"Customer service bots, virtual assistants intent routing."},
                  {icon:"🖼️",title:"Image Search & Visual Similarity",col:"#60a5fa",
                   desc:"Embed images with CNN/ViT features. Find visually similar images, enable reverse image search, or with CLIP: search images using text descriptions.",
                   example:"Pinterest visual search, Google Lens, reverse image search."},
                ].map(a=>(
                  <div key={a.title} style={{...S.card,borderLeft:`3px solid ${a.col}`,marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                      <span style={{fontSize:22}}>{a.icon}</span>
                      <span style={{fontWeight:700,fontSize:14,color:a.col}}>{a.title}</span>
                    </div>
                    <p style={{...S.p,fontSize:13,marginBottom:6}}>{a.desc}</p>
                    <div style={{fontFamily:"monospace",fontSize:11,color:C.muted,background:C.surface2,borderRadius:6,padding:"6px 10px"}}>
                      📍 {a.example}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* ══════════════════════════════════════════════════════════════════════
                TAB 12 — INTERVIEWS
            ══════════════════════════════════════════════════════════════════════ */}
            {tab==="iq"&&(
              <div>
                <span style={S.label}>Chapter 12</span>
                <h2 style={S.h2}>All Interview Questions</h2>
                <p style={S.p}>30 questions covering fundamentals to senior ML engineer level. Click any question to see a thorough answer.</p>
                <div style={{background:C.surface2,borderRadius:8,padding:12,marginBottom:20,display:"flex",gap:12,flexWrap:"wrap"}}>
                  {[["⚡ Fundamentals","7 questions"],["🧠 Architecture","7 questions"],["🚀 Applied","6 questions"],["🎯 Deep/Tricky","5 questions"]].map(([c,n])=>(
                    <div key={c} style={{fontSize:12}}><span style={{fontWeight:700}}>{c}</span> <span style={{color:C.muted}}>{n}</span></div>
                  ))}
                </div>
                {Object.entries(iqData).map(([title,items])=>(
                  <IQSection key={title} title={title} items={items}/>
                ))}
              </div>
            )}

          </div>

          <div style={{textAlign:"center",padding:"32px 16px",color:C.muted,fontFamily:"monospace",fontSize:11,borderTop:`1px solid ${C.border}`}}>
            Vector Embeddings Complete Guide &nbsp;·&nbsp; Next: Attention Mechanism → Transformers → BERT/GPT internals
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
